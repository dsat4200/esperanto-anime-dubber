<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>anidub-edit</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <span class="logo">anidub-edit</span>
  <nav>
    <button onclick="saveProject()">Save</button>
    <button onclick="assembleFull()">Assemble</button>
  </nav>
</header>

<main>
  <!-- Setup panel -->
  <div id="setup-panel" class="panel" style="display:flex">
    <h2>Open Project</h2>

    <div class="form-row">
      <label>Existing project:</label>
      <select id="project-picker" onchange="onProjectPicker()"><option value="">-- load --</option></select>
      <button onclick="loadSelectedProject()">Load</button>
    </div>

    <div class="form-row">
      <label>Or new from anime folder:</label>
      <input type="text" id="anime-name" placeholder="hxh">
      <button onclick="openAnime()">Create Project</button>
    </div>

    <div id="tracks-section" style="display:none">
      <h3>Audio Tracks</h3>
      <div id="audio-tracks"></div>
      <h3>Subtitle Tracks</h3>
      <div id="sub-tracks"></div>
      <button id="btn-demucs" onclick="runDemucs()">Run Demucs</button>
      <button id="btn-start" onclick="startEditing()" style="display:none">Start Editing</button>
      <div id="demucs-status"></div>
    </div>
  </div>

  <!-- Editor panel -->
  <div id="editor-panel" class="panel" style="display:none">
    <div id="editor-left">
      <video id="video-player" controls></video>
    </div>
    <div id="editor-right">
      <div class="top-bar">
        <span id="clip-title">Clip -/--</span>
        <select id="episode-select" onchange="switchEpisode(this.value)"><option>--</option></select>
        <button onclick="prevClip()">&larr;</button>
        <button onclick="nextClip()">&rarr;</button>
      </div>

      <div class="field">
        <label>Original:</label>
        <div id="original-text" class="readonly"></div>
      </div>

      <div class="field">
        <label>Translation:</label>
        <textarea id="translation-text" rows="3"></textarea>
        <div class="btn-row">
          <button onclick="translateCurrent()">Re-translate</button>
        </div>
      </div>

      <div class="field">
        <label>Character:</label>
        <select id="char-select" onchange="onCharacterChange()"><option value="">-- none --</option></select>
        <label>Mood:</label>
        <select id="mood-select" onchange="onCharacterChange()"><option value="normal">normal</option></select>
        <div class="btn-row">
          <button onclick="saveCharacter()">Save as character clip</button>
          <button onclick="toggleCharPanel()">Manage</button>
        </div>
      </div>

      <div class="field">
        <label>Additional clone instructions:</label>
        <textarea id="instruct-extra" rows="2" placeholder="extra pronunciation / delivery notes for Esperanto TTS"></textarea>
        <div class="btn-row">
          <button onclick="saveInstruct()">Save instructions</button>
        </div>
      </div>

      <div class="field">
        <label>Timing offset (<span id="offset-val">0</span>ms):</label>
        <input type="range" id="offset-slider" min="-500" max="500" value="0" step="10" oninput="onOffsetChange(this.value)">
      </div>

      <div class="field">
        <label>Speed (<span id="speed-val">1.00</span>x):</label>
        <input type="range" id="speed-slider" min="50" max="200" value="100" step="1" onchange="onSpeedChange(this.value)">
      </div>

      <div class="field clone-only">
        <button class="primary" onclick="cloneCurrent()">Clone</button>
        <button onclick="previewCurrent()">Preview</button>
        <span id="clone-info"></span>
      </div>

      <div class="field btn-row accept-only">
        <button class="accept" onclick="acceptCurrent()">Accept</button>
        <button class="reject" onclick="rejectCurrent()">Reject</button>
        <button class="reset" onclick="resetCurrent()">Reset</button>
      </div>
    </div>
  </div>

  <!-- Character panel -->
  <div id="char-panel" class="panel side-panel" style="display:none">
    <h3>Characters <button onclick="toggleCharPanel()">X</button></h3>
    <div id="char-list"></div>
    <div class="form-row">
      <input type="text" id="new-char-name" placeholder="Name">
      <input type="text" id="new-char-mood" placeholder="mood (normal)">
      <button onclick="addCharacter()">Add</button>
    </div>
    <p class="hint">"Add" copies current clip's ref.wav as a character voice print.</p>
  </div>
</main>

<!-- Bulk bar -->
<div id="bulk-bar">
  <button onclick="translateAll()">Translate All</button>
  <button onclick="cloneAll()">Clone All</button>
  <span id="bulk-status"></span>
</div>

<!-- Timeline bar -->
<div id="timeline-bar">
  <div id="timeline-inner"></div>
</div>

<!-- Status overlay -->
<div id="overlay" style="display:none"><div id="overlay-msg"></div></div>

<script src="/static/app.js"></script>
</body>
</html>
