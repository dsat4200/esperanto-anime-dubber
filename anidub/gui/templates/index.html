<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>anidub-edit</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <span class="logo">anidub-edit</span>
  <nav>
    <button onclick="goHome()">Home</button>
    <button onclick="saveProject()">Save</button>
    <button onclick="assembleFull()">Assemble</button>
  </nav>
</header>

<main>
  <!-- EPISODE HOME PANEL -->
  <div id="home-panel" class="panel" style="display:flex">
    <div class="form-row">
      <select id="project-picker" onchange="onProjectPicker()"><option value="">-- load --</option></select>
      <button onclick="loadSelectedProject()">Load</button>
      <input type="text" id="anime-name" placeholder="anime folder name">
      <button onclick="openAnime()">Create Project</button>
    </div>
    <div id="home-episodes" style="display:none">
      <div class="home-header">
        <h2 id="home-title"></h2>
        <div id="batch-actions" style="display:none">
          <button onclick="batchTranslate()">Batch Translate (<span class="sel-count">0</span>)</button>
          <button onclick="batchClone()">Batch Clone (<span class="sel-count">0</span>)</button>
        </div>
      </div>
      <div id="episode-grid"></div>
    </div>
  </div>

  <!-- EDITOR PANEL -->
  <div id="editor-panel" class="panel" style="display:none">
    <div id="editor-left">
      <video id="video-player" controls></video>

      <div class="field clone-only">
        <label>Audio shift (<span id="audio-shift-val">0</span>ms):</label>
        <input type="range" id="audio-shift-slider" min="-500" max="500" value="0" step="10" onchange="onAudioShiftChange(this.value)">
      </div>

      <div class="field clone-only">
        <label>Dialogue speed (<span id="speed-val">1.00</span>x):</label>
        <input type="range" id="speed-slider" min="50" max="200" value="100" step="1" onchange="onSpeedChange(this.value)">
      </div>

      <div class="field clone-only">
        <button class="primary" onclick="saveSettings()">Save settings</button>
        <button onclick="cloneCurrent()">Clone</button>
        <button onclick="previewCurrent()">Preview</button>
        <span id="clone-info"></span>
      </div>

      <div class="field">
        <button onclick="toggleSign()" id="btn-toggle-sign">Mark as Sign</button>
      </div>

      <div class="btn-row accept-only">
        <button class="accept" onclick="acceptCurrent()">Accept</button>
        <button class="reject" onclick="rejectCurrent()">Reject</button>
        <button class="reset" onclick="resetCurrent()">Reset</button>
      </div>
    </div>
    <div id="editor-right">
      <div class="top-bar">
        <span id="clip-title">Clip -/--</span>
        <select id="episode-select" onchange="switchEpisode(this.value)"><option>--</option></select>
        <button onclick="prevClip()">&larr;</button>
        <button onclick="nextClip()">&rarr;</button>
      </div>

      <div class="field">
        <label>Original:</label>
        <div id="original-text" class="readonly"></div>
      </div>

      <div class="field">
        <label>Translation:</label>
        <textarea id="translation-text" rows="3"></textarea>
        <div class="btn-row">
          <button onclick="restoreTranslation()">Restore original translation</button>
        </div>
      </div>

      <div class="field">
        <label>Pronunciation override:</label>
        <textarea id="pronunciation-text" rows="2" placeholder="Leave empty to use translation"></textarea>
      </div>

      <div class="field">
        <label>Character:</label>
        <select id="char-select" onchange="onCharacterChange()"><option value="">-- none --</option></select>
        <label>Mood:</label>
        <select id="mood-select" onchange="onCharacterChange()"><option value="normal">normal</option></select>
        <div class="btn-row">
          <button onclick="saveCharacter()">Save as character clip</button>
          <button onclick="toggleCharPanel()">Manage</button>
        </div>
      </div>

      <div class="field">
        <label>Additional clone instructions:</label>
        <textarea id="instruct-extra" rows="2"></textarea>
      </div>
    </div>
  </div>

  <!-- Character panel -->
  <div id="char-panel" class="panel side-panel" style="display:none">
    <h3>Characters <button onclick="toggleCharPanel()">X</button></h3>
    <div id="char-list"></div>
    <div class="form-row">
      <input type="text" id="new-char-name" placeholder="Name">
      <input type="text" id="new-char-mood" placeholder="mood (normal)">
      <button onclick="addCharacter()">Add</button>
    </div>
    <p class="hint">"Add" copies current clip's ref.wav as a character voice print.</p>
  </div>
</main>

<!-- Bulk bar -->
<div id="bulk-bar">
  <button onclick="translateAll()">Translate All</button>
  <button onclick="cloneAll()">Clone All</button>
  <span id="bulk-status"></span>
</div>

<!-- Job bar -->
<div id="job-bar" class="job-bar" style="display:none">
  <span class="spinner"></span>
  <span id="job-msg"></span>
  <button onclick="cancelJob()">Cancel</button>
</div>

<!-- Timeline bar -->
<div id="timeline-bar">
  <canvas id="timeline-canvas"></canvas>
</div>

<!-- Timeline context menu -->
<div id="timeline-menu" class="ctx-menu" style="display:none">
  <div onclick="ctxDelete()">Delete clip</div>
  <div onclick="ctxToggleSign()">Toggle sign/audio</div>
</div>

<!-- Track pick modal -->
<div id="track-modal" class="modal" style="display:none">
  <div class="modal-content">
    <h3>Select Tracks for Batch</h3>
    <p class="modal-hint">Applied to all selected episodes. Episodes with different counts will be skipped.</p>
    <div id="modal-audio-tracks"></div>
    <div id="modal-sub-tracks"></div>
    <div class="modal-btns">
      <button class="primary" onclick="confirmBatchTracks()">Run</button>
      <button onclick="cancelBatchTracks()">Cancel</button>
    </div>
  </div>
</div>

<!-- Status overlay -->
<div id="overlay" style="display:none"><div id="overlay-msg"></div></div>

<script src="/static/app.js"></script>
</body>
</html>
